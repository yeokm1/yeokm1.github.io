  <title
     id="title">Apple II bank switching overview</title>
  <desc
     id="desc">A diagram showing the Apple II 64 KB CPU address space, the D000 to FFFF banked window, possible ROM, language-card and Saturn backings, and the aux RAM copy-down path.</desc>
  <defs
     id="defs2">
    <style
       id="style1">
      .bg { fill: #ffffff; }
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #222; }
      .subtitle { font: 14px Arial, Helvetica, sans-serif; fill: #555; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #222; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #333; }
      .tiny { font: 11px Arial, Helvetica, sans-serif; fill: #555; }
      .mono { font: 12px &quot;Courier New&quot;, monospace; fill: #222; }

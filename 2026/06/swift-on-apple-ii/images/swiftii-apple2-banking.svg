     height="135"
     id="rect5" />
  <text
     class="mono"
     x="86"
     y="149"
     id="text6">$D000-$FFFF</text>
  <text
     class="label"
     x="86"
     y="171"
     id="text7">Banked Window</text>
  <text
     class="small"
     x="86"
     y="193"
     id="text8">ROM, Language Card,</text>
  <text

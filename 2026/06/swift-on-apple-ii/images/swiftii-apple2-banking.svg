      .window { fill: #fff2a8; stroke: #222; stroke-width: 2.5; }
      .main { fill: #cde8ff; }
      .low { fill: #d8f0cf; }
      .io { fill: #f8d7da; }
      .global { fill: #e8ddff; }
      .rom { fill: #f7c6c7; }

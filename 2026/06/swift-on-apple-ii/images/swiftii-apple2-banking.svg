     id="text2"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:24px;line-height:normal;font-family:Arial, Helvetica, sans-serif">Apple II Banking: One Visible Window, many Possible Backings</text>
  <text
     class="subtitle"
     x="40"
     y="62"
     id="text3">The 6502 still sees only 64 KB. Soft switches decide what physical RAM or ROM appears in the banked ranges.</text>

     y="216"
     id="text42">$D000-$FFFF</text>
  <text
     class="small"
     x="817"
     y="216"
     id="text43"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:12px;line-height:normal;font-family:Arial, Helvetica, sans-serif">window.</text>
  <text
     class="small"
